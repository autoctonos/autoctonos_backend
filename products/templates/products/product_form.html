{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Product</title>
</head>
<body>
    <h1>Edit Product</h1>

        {{ form.as_p }}

    </form>
    <p><a href="{% url 'product-dashboard' %}">Back to dashboard</a></p>
</body>
</html>
